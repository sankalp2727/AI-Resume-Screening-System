<!DOCTYPE html>
<html>
<head>
    <title>Upload Resumes | HR Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f6f9;">

<nav class="navbar navbar-dark" style="background-color:#1f2d3d;">
  <div class="container">
    <span class="navbar-brand fw-bold">HR Screening Portal</span>
  </div>
</nav>

<div class="container mt-5">
    <div class="card shadow-sm p-4">

        <h4 class="mb-4 fw-bold">Upload Candidate Resumes</h4>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-4">
                <label class="form-label fw-semibold">Resume Files (PDF)</label>
                <input type="file" class="form-control" name="resume" multiple required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Job Description</label>
                <textarea class="form-control" name="job_desc" rows="6" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary px-4">Analyze & Rank</button>

        </form>

    </div>
</div>

<footer class="text-center mt-5 p-3 text-muted">
    HR Analytics Dashboard
</footer>

</body>
</html>
